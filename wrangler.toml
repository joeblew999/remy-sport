name = "remy-sport"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "remy-sport-db"
database_id = "3bf4aa25-3250-491e-83e7-ba8dbf5562f5"
migrations_dir = "src/db/migrations"

# R2 Storage
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "remy-sport-storage"

[observability]
enabled            = true
head_sampling_rate = 1

[vars]
BETTER_AUTH_URL = "https://remy-sport.gedw99.workers.dev"

# BETTER_AUTH_SECRET is set via `wrangler secret` — not stored in config
# For local dev, .dev.vars provides the secret
