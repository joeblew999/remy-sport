version: "3"

vars:
  WORKER_NAME: remy-sport
  CF_SUBDOMAIN: gedw99
  DEPLOYED_URL: 'https://{{.WORKER_NAME}}.{{.CF_SUBDOMAIN}}.workers.dev'

tasks:
  setup:
    desc: Install deps and apply local migrations (idempotent)
    cmds:
      - task: install
      - task: cf:d1:migrations:apply

  install:
    desc: Install dependencies (idempotent via checksum)
    sources:
      - package.json
      - bun.lock
    generates:
      - node_modules/.package-lock.json
    cmd: bun install

  dev:
    desc: Start local dev server
    deps: [setup]
    cmd: bunx wrangler dev

  check:
    desc: Type check the project (idempotent via checksum)
    sources:
      - src/**/*.ts
      - tsconfig.json
    cmd: bunx tsc --noEmit

  test:
    desc: Run playwright tests locally
    deps: [setup]
    cmd: bunx playwright test

  test:deployed:
    desc: Run playwright tests against deployed worker
    cmd: bunx playwright test
    env:
      BASE_URL: "{{.DEPLOYED_URL}}"

  test:ui:
    desc: Run playwright tests with UI
    cmd: bunx playwright test --ui

  deploy:
    desc: Build, deploy, migrate remote, and test deployed worker (idempotent)
    cmds:
      - task: setup
      - task: check
      - task: test
      - task: versions
      - task: cf:deploy
      - task: cf:d1:migrations:apply:remote
      - task: test:deployed

  versions:
    desc: Generate versions.json with deployment info (idempotent via checksum)
    sources:
      - package.json
      - .git/HEAD
      - .git/refs/heads/**/*
    generates:
      - versions.json
    cmds:
      - |
        APP_VERSION=$(node -p "require('./package.json').version")
        cat <<EOF > versions.json
        {
          "_generated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "app": "$APP_VERSION",
          "url": "{{.DEPLOYED_URL}}",
          "git": {
            "commit": "$(git rev-parse --short HEAD)",
            "branch": "$(git branch --show-current)",
            "tag": "$(git describe --tags --always 2>/dev/null || echo 'none')"
          }
        }
        EOF

includes:
  cf:
    taskfile: ./taskfiles/Taskfile.cloudflare.yml
    optional: false
