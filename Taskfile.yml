version: "3"

tasks:
  setup:
    desc: Install deps and apply local migrations (idempotent)
    cmds:
      - task: install
      - task: cf:d1:migrations:apply

  install:
    desc: Install dependencies
    sources:
      - package.json
      - bun.lock
    generates:
      - node_modules/.package-lock.json
    cmd: bun install

  dev:
    desc: Start local dev server
    deps: [setup]
    cmd: bunx wrangler dev

  check:
    desc: Type check the project
    cmd: bunx tsc --noEmit

  test:
    desc: Run playwright tests
    deps: [setup]
    cmd: bunx playwright test

  test:ui:
    desc: Run playwright tests with UI
    cmd: bunx playwright test --ui

  versions:
    desc: Generate versions.json with deployment info
    cmds:
      - |
        APP_VERSION=$(node -p "require('./package.json').version")
        cat <<EOF > versions.json
        {
          "_generated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "app": "$APP_VERSION",
          "git": {
            "commit": "$(git rev-parse --short HEAD)",
            "branch": "$(git branch --show-current)",
            "tag": "$(git describe --tags --always 2>/dev/null || echo 'none')"
          }
        }
        EOF

includes:
  cf:
    taskfile: ./taskfiles/Taskfile.cloudflare.yml
    optional: false
