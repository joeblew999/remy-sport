version: "3"

vars:
  WORKER_NAME: remy-sport
  CF_SUBDOMAIN: gedw99
  DEPLOYED_URL: 'https://{{.WORKER_NAME}}.{{.CF_SUBDOMAIN}}.workers.dev'

tasks:
  setup:
    desc: Install deps and apply local migrations (idempotent)
    cmds:
      - task: install
      - task: cf:d1:migrations:apply

  install:
    desc: Install dependencies (idempotent via checksum)
    sources:
      - package.json
      - bun.lock
    generates:
      - node_modules/.package-lock.json
    cmd: bun install

  dev:
    desc: Start local dev server
    deps: [setup]
    cmd: bunx wrangler dev

  check:
    desc: Type check the project (idempotent via checksum)
    sources:
      - src/**/*.ts
      - tsconfig.json
    cmd: bunx tsc --noEmit

  test:
    desc: Run playwright tests locally
    deps: [setup]
    cmd: bunx playwright test

  test:deployed:
    desc: Run playwright tests against deployed worker
    cmd: bunx playwright test
    env:
      BASE_URL: "{{.DEPLOYED_URL}}"

  test:ui:
    desc: Run playwright tests with UI
    cmd: bunx playwright test --ui

  deploy:
    desc: Build, deploy, migrate remote, and test deployed worker (idempotent)
    cmds:
      - task: setup
      - task: check
      - task: test
      - task: versions
      - task: cf:deploy
      - task: cf:d1:migrations:apply:remote
      - task: test:deployed

  versions:
    desc: Generate versions.json with git history and CF versions
    cmds:
      - |
        node -e "(async () => {
        const fs = require('fs');
        const https = require('https');
        const { execSync } = require('child_process');
        const run = cmd => execSync(cmd, { encoding: 'utf-8' }).trim();

        // Build current entry
        const current = {
          _generated: new Date().toISOString(),
          app: require('./package.json').version,
          url: '{{.DEPLOYED_URL}}',
          git: {
            commit: run('git rev-parse --short HEAD'),
            branch: run('git branch --show-current'),
            tag: run('git describe --tags --always 2>/dev/null || echo none'),
          },
        };

        // Load existing history
        let history = [];
        try {
          const prev = JSON.parse(fs.readFileSync('versions.json', 'utf-8'));
          history = prev.history || [];
          if (history[0]?.git?.commit !== current.git.commit) {
            history.unshift(prev.current || { app: prev.app, git: prev.git, url: prev.url });
          }
        } catch {}
        history = history.filter(h => h.git?.commit !== current.git.commit);
        history = history.slice(0, 20);

        // Health-check a URL (returns true/false)
        const checkHealth = url => new Promise(resolve => {
          https.get(url + '/api/health', { timeout: 5000 }, res => resolve(res.statusCode === 200))
            .on('error', () => resolve(false))
            .on('timeout', function() { this.destroy(); resolve(false); });
        });

        // Fetch CF versions with health-checked preview URLs
        let cf_versions = [];
        try {
          const raw = JSON.parse(run('bunx wrangler versions list --json 2>/dev/null'));
          cf_versions = await Promise.all(raw.map(async v => {
            const previewId = v.id.split('-')[0];
            const previewUrl = v.metadata.has_preview
              ? 'https://' + previewId + '-{{.WORKER_NAME}}.{{.CF_SUBDOMAIN}}.workers.dev' : null;
            const healthy = previewUrl ? await checkHealth(previewUrl) : false;
            return {
              id: v.id,
              number: v.number,
              created: v.metadata.created_on,
              source: v.annotations?.['workers/triggered_by'] || v.metadata.source,
              url: healthy ? previewUrl : null,
            };
          }));
        } catch {}

        fs.writeFileSync('versions.json', JSON.stringify({ current, history, cf_versions }, null, 2) + '\n');
        })()"

includes:
  cf:
    taskfile: ./taskfiles/Taskfile.cloudflare.yml
    optional: false
