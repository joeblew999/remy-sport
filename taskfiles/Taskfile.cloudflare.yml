version: "3"

vars:
  WORKER_NAME: remy-sport
  DB_NAME: '{{.WORKER_NAME}}-db'
  BUCKET_NAME: '{{.WORKER_NAME}}-storage'

tasks:
  # --- Development ---
  dev:
    desc: Start local dev server with wrangler
    cmd: bunx wrangler dev

  dev:remote:
    desc: Start dev server against remote Cloudflare resources
    cmd: bunx wrangler dev --remote

  # --- Deployment ---
  deploy:
    desc: Deploy worker to Cloudflare (idempotent via checksum)
    sources:
      - src/**/*.ts
      - wrangler.toml
      - package.json
      - versions.json
    cmd: bunx wrangler deploy

  deploy:staging:
    desc: Deploy worker to staging environment
    cmd: bunx wrangler deploy --env staging

  deploy:production:
    desc: Deploy worker to production environment
    cmd: bunx wrangler deploy --env production

  # --- Versioned Deployments ---
  versions:list:
    desc: List deployed versions
    cmd: bunx wrangler versions list

  versions:upload:
    desc: Create a new version without deploying
    cmd: bunx wrangler versions upload

  versions:deploy:
    desc: Gradually roll out a version (interactive)
    cmd: bunx wrangler versions deploy

  rollback:
    desc: Roll back to previous version
    cmd: bunx wrangler rollback

  # --- D1 Database ---
  d1:list:
    desc: List D1 databases
    cmd: bunx wrangler d1 list

  d1:create:
    desc: Create the project D1 database
    cmd: bunx wrangler d1 create {{.DB_NAME}}

  d1:tables:
    desc: List tables in local D1
    cmd: bunx wrangler d1 execute {{.DB_NAME}} --local --command "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name"

  d1:tables:remote:
    desc: List tables in remote D1
    cmd: bunx wrangler d1 execute {{.DB_NAME}} --remote --command "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name"

  d1:execute:
    desc: Execute SQL against local D1
    cmd: bunx wrangler d1 execute {{.DB_NAME}} --local --command "{{.SQL}}"
    requires:
      vars: [SQL]

  d1:execute:remote:
    desc: Execute SQL against remote D1
    cmd: bunx wrangler d1 execute {{.DB_NAME}} --remote --command "{{.SQL}}"
    requires:
      vars: [SQL]

  d1:migrations:create:
    desc: Create a new D1 migration
    cmd: bunx wrangler d1 migrations create {{.DB_NAME}} "{{.NAME}}"
    requires:
      vars: [NAME]

  d1:migrations:apply:
    desc: Apply D1 migrations locally (idempotent)
    cmd: bunx wrangler d1 migrations apply {{.DB_NAME}} --local

  d1:migrations:apply:remote:
    desc: Apply D1 migrations to remote (idempotent)
    cmd: bunx wrangler d1 migrations apply {{.DB_NAME}} --remote

  # --- R2 Storage ---
  r2:list:
    desc: List R2 buckets
    cmd: bunx wrangler r2 bucket list

  r2:create:
    desc: Create the project R2 bucket
    cmd: bunx wrangler r2 bucket create {{.BUCKET_NAME}}

  r2:objects:
    desc: List objects in the project R2 bucket
    cmd: bunx wrangler r2 object list {{.BUCKET_NAME}}

  # --- Secrets & Config ---
  secret:list:
    desc: List secrets
    cmd: bunx wrangler secret list

  # --- Logs & Debugging ---
  tail:
    desc: Tail live worker logs
    cmd: bunx wrangler tail

  whoami:
    desc: Show current Cloudflare auth info
    cmd: bunx wrangler whoami
