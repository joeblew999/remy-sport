[tools]
bun  = "1.3.11"
jq   = "1.8.1"
node = "24.14.1"

[env]
WORKER_NAME  = "remy-sport"
CF_SUBDOMAIN = "gedw99"
DEPLOYED_URL = "https://remy-sport.gedw99.workers.dev"
GITHUB_REPO  = "https://github.com/joeblew999/remy-sport"
LOCAL_URL    = "http://localhost:8787"
DB_NAME      = "remy-sport-db"
BUCKET_NAME  = "remy-sport-storage"

# ── Core ────────────────────────────────────────────────────────────────────

[tasks.install]
description = "Install dependencies"
sources     = ["package.json", "bun.lock"]
run         = "bun install"

[tasks.setup]
description = "Install deps and apply local D1 migrations"
depends     = ["install", "cf:d1:migrations:apply"]

[tasks.dev]
description = "Start local dev server (port 8787)"
depends     = ["setup"]
run         = "bun x wrangler dev"

[tasks.check]
description = "TypeScript type check"
sources     = ["src/**/*.ts", "tsconfig.json"]
run         = "bun x tsc --noEmit"

[tasks.test]
description = "Run Playwright tests locally"
depends     = ["setup"]
run         = "bun x playwright test"

[tasks.versions]
description = "Generate versions.json"
run         = "bun scripts/versions.ts"

[tasks.seed]
description = "Seed local D1 with dev users (requires mise run dev)"
run         = "curl -sf -X POST {{env.LOCAL_URL}}/api/seed | jq ."

[tasks.deploy]
description = "Full deploy pipeline"
depends     = ["setup", "check", "test", "versions", "cf:deploy", "cf:d1:migrations:apply:remote", "seed:remote", "test:deployed"]

# ── Remote / test variants ───────────────────────────────────────────────────

[tasks."dev:remote"]
description = "Dev server against remote Cloudflare resources"
run         = "bun x wrangler dev --remote"

[tasks."test:deployed"]
description = "Run Playwright tests against deployed worker"
env         = { BASE_URL = "{{env.DEPLOYED_URL}}" }
run         = "bun x playwright test"

[tasks."test:ui"]
description = "Run Playwright tests with interactive UI"
run         = "bun x playwright test --ui"

[tasks."seed:remote"]
description = "Seed remote D1 with dev users (idempotent)"
run         = "curl -sf -X POST {{env.DEPLOYED_URL}}/api/seed | jq ."

# ── cf: deploy ───────────────────────────────────────────────────────────────

[tasks."cf:deploy"]
description = "Deploy worker to Cloudflare"
sources     = ["src/**/*.ts", "wrangler.toml", "package.json", "versions.json"]
run         = "bun x wrangler deploy"

[tasks."cf:deploy:staging"]
description = "Deploy to staging environment"
run         = "bun x wrangler deploy --env staging"

[tasks."cf:deploy:production"]
description = "Deploy to production environment"
run         = "bun x wrangler deploy --env production"

[tasks."cf:versions:list"]
description = "List deployed versions"
run         = "bun x wrangler versions list"

[tasks."cf:versions:upload"]
description = "Upload a version without deploying"
run         = "bun x wrangler versions upload"

[tasks."cf:versions:deploy"]
description = "Gradual rollout (interactive)"
run         = "bun x wrangler versions deploy"

[tasks."cf:rollback"]
description = "Roll back to the previous version"
run         = "bun x wrangler rollback"

[tasks."cf:tail"]
description = "Tail live worker logs"
run         = "bun x wrangler tail"

[tasks."cf:whoami"]
description = "Show current Cloudflare auth info"
run         = "bun x wrangler whoami"

[tasks."cf:secret:list"]
description = "List secrets set on the worker"
run         = "bun x wrangler secret list"

# ── cf:d1: database ──────────────────────────────────────────────────────────

[tasks."cf:d1:list"]
description = "List D1 databases"
run         = "bun x wrangler d1 list"

[tasks."cf:d1:create"]
description = "Create the project D1 database"
run         = "bun x wrangler d1 create {{env.DB_NAME}}"

[tasks."cf:d1:tables"]
description = "List tables in local D1"
run         = "bun x wrangler d1 execute {{env.DB_NAME}} --local --command \"SELECT name FROM sqlite_master WHERE type='table' ORDER BY name\""

[tasks."cf:d1:tables:remote"]
description = "List tables in remote D1"
run         = "bun x wrangler d1 execute {{env.DB_NAME}} --remote --command \"SELECT name FROM sqlite_master WHERE type='table' ORDER BY name\""

[tasks."cf:d1:migrations:create"]
description = "Create a new D1 migration (set NAME env var)"
run         = "bun x wrangler d1 migrations create {{env.DB_NAME}} \"$NAME\""

[tasks."cf:d1:migrations:apply"]
description = "Apply D1 migrations locally (idempotent)"
run         = "bun x wrangler d1 migrations apply {{env.DB_NAME}} --local"

[tasks."cf:d1:migrations:apply:remote"]
description = "Apply D1 migrations to remote (idempotent)"
run         = "bun x wrangler d1 migrations apply {{env.DB_NAME}} --remote"

# ── cf:r2: storage ───────────────────────────────────────────────────────────

[tasks."cf:r2:list"]
description = "List R2 buckets"
run         = "bun x wrangler r2 bucket list"

[tasks."cf:r2:create"]
description = "Create the project R2 bucket"
run         = "bun x wrangler r2 bucket create {{env.BUCKET_NAME}}"

[tasks."cf:r2:objects"]
description = "List objects in the R2 bucket"
run         = "bun x wrangler r2 object list {{env.BUCKET_NAME}}"
