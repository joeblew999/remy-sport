[tools]
bun  = "1.3.11"
jq   = "1.8.1"
node = "24.14.1"

[env]
CF_WORKER_NAME  = "remy-sport"
CF_SUBDOMAIN    = "gedw99"
CF_DEPLOY_URL   = "https://remy-sport.gedw99.workers.dev"
CF_D1_NAME      = "remy-sport-db"
CF_R2_NAME      = "remy-sport-storage"
DEV_URL         = "http://localhost:8787"
GITHUB_REPO_URL = "https://github.com/joeblew999/remy-sport"

# ── Core ────────────────────────────────────────────────────────────────────

[tasks.install]
description = "Install dependencies"
sources     = ["package.json", "bun.lock"]
run         = "bun install"

[tasks.setup]
description = "Install deps, apply local D1 migrations, and install Playwright"
depends     = ["install", "cf:d1:migrations:apply", "playwright:install"]

[tasks."playwright:install"]
description = "Install Playwright browsers (proxy-safe, idempotent)"
depends     = ["install"]
run         = """
BROWSERS_JSON="node_modules/playwright-core/browsers.json"
CHROMIUM_VERSION=$(node -e "const b=require('./$BROWSERS_JSON'); const c=b.browsers.find(x=>x.name==='chromium'); console.log(c.browserVersion)")
CHROMIUM_REV=$(node -e "const b=require('./$BROWSERS_JSON'); const c=b.browsers.find(x=>x.name==='chromium'); console.log(c.revision)")
PW_DIR="$HOME/.cache/ms-playwright"

if [ -d "$PW_DIR/chromium-$CHROMIUM_REV/chrome-linux64" ] && [ -d "$PW_DIR/chromium_headless_shell-$CHROMIUM_REV/chrome-headless-shell-linux64" ]; then
  echo "Playwright chromium v$CHROMIUM_REV already installed, skipping"
  exit 0
fi

echo "Installing Playwright chromium $CHROMIUM_VERSION (rev $CHROMIUM_REV) via curl..."
curl -fsSL -o /tmp/chrome-linux64.zip "https://cdn.playwright.dev/builds/cft/$CHROMIUM_VERSION/linux64/chrome-linux64.zip"
curl -fsSL -o /tmp/chrome-headless-shell-linux64.zip "https://cdn.playwright.dev/builds/cft/$CHROMIUM_VERSION/linux64/chrome-headless-shell-linux64.zip"

mkdir -p "$PW_DIR/chromium-$CHROMIUM_REV" "$PW_DIR/chromium_headless_shell-$CHROMIUM_REV"
unzip -qo /tmp/chrome-linux64.zip -d "$PW_DIR/chromium-$CHROMIUM_REV/"
unzip -qo /tmp/chrome-headless-shell-linux64.zip -d "$PW_DIR/chromium_headless_shell-$CHROMIUM_REV/"
rm -f /tmp/chrome-linux64.zip /tmp/chrome-headless-shell-linux64.zip

# Install system deps for Chromium (if apt available)
if command -v apt-get &>/dev/null; then
  bun x playwright install-deps chromium 2>/dev/null || true
fi

echo "Playwright chromium v$CHROMIUM_REV installed successfully"
"""

[tasks.dev]
description = "Start local dev server (port 8787)"
depends     = ["setup"]
run         = "bun x wrangler dev"

[tasks.check]
description = "TypeScript type check"
depends     = ["cf:types"]
sources     = ["src/**/*.ts", "tsconfig.json"]
run         = "bun x tsc --noEmit"

[tasks.test]
description = "Run Playwright tests locally"
depends     = ["setup"]
run         = "bun x playwright test"

[tasks.versions]
description = "Generate versions.json"
run         = "bun scripts/versions.ts"

[tasks."dev:seed"]
description = "Start dev server, wait for readiness, seed, then keep server running"
depends     = ["setup"]
run         = """
bun x wrangler dev &
SERVER_PID=$!
for i in $(seq 1 30); do
  if curl -sf http://localhost:8787/ >/dev/null 2>&1; then
    break
  fi
  sleep 1
done
curl -sf -X POST {{env.DEV_URL}}/api/seed | jq . || true
wait $SERVER_PID
"""

[tasks.seed]
description = "Seed local D1 with dev users (requires running dev server)"
run         = "curl -sf -X POST {{env.DEV_URL}}/api/seed | jq ."

[tasks.deploy]
description = "Full deploy pipeline"
depends     = ["setup", "check", "test", "versions", "cf:deploy", "cf:d1:migrations:apply:remote", "seed:remote", "test:deployed"]

# ── Remote / test variants ───────────────────────────────────────────────────

[tasks."dev:remote"]
description = "Dev server against remote Cloudflare resources"
run         = "bun x wrangler dev --remote"

[tasks."test:deployed"]
description = "Run Playwright tests against deployed worker"
env         = { BASE_URL = "{{env.CF_DEPLOY_URL}}" }
run         = "bun x playwright test"

[tasks."test:ui"]
description = "Run Playwright tests with interactive UI"
run         = "bun x playwright test --ui"

[tasks."seed:remote"]
description = "Seed remote D1 with dev users (idempotent)"
run         = "curl -sf -X POST {{env.CF_DEPLOY_URL}}/api/seed | jq ."

# ── cf: deploy ───────────────────────────────────────────────────────────────

[tasks."cf:deploy"]
description = "Deploy worker to Cloudflare"
sources     = ["src/**/*.ts", "wrangler.toml", "package.json", "versions.json"]
run         = "bun x wrangler deploy"

[tasks."cf:deploy:staging"]
description = "Deploy to staging environment"
run         = "bun x wrangler deploy --env staging"

[tasks."cf:deploy:production"]
description = "Deploy to production environment"
run         = "bun x wrangler deploy --env production"

[tasks."cf:versions:list"]
description = "List deployed versions"
run         = "bun x wrangler versions list"

[tasks."cf:versions:upload"]
description = "Upload a version without deploying"
run         = "bun x wrangler versions upload"

[tasks."cf:versions:deploy"]
description = "Gradual rollout (interactive)"
run         = "bun x wrangler versions deploy"

[tasks."cf:rollback"]
description = "Roll back to the previous version"
run         = "bun x wrangler rollback"

[tasks."cf:tail"]
description = "Tail live worker logs"
run         = "bun x wrangler tail"

[tasks."cf:whoami"]
description = "Show current Cloudflare auth info"
run         = "bun x wrangler whoami"

[tasks."cf:secret:list"]
description = "List secrets set on the worker"
run         = "bun x wrangler secret list"

[tasks."cf:types"]
description = "Generate TypeScript types from wrangler bindings (worker-configuration.d.ts)"
run         = "bun x wrangler types"

# ── cf:d1: database ──────────────────────────────────────────────────────────

[tasks."cf:d1:list"]
description = "List D1 databases"
run         = "bun x wrangler d1 list"

[tasks."cf:d1:create"]
description = "Create the project D1 database"
run         = "bun x wrangler d1 create {{env.CF_D1_NAME}}"

[tasks."cf:d1:tables"]
description = "List tables in local D1"
run         = "bun x wrangler d1 execute {{env.CF_D1_NAME}} --local --command \"SELECT name FROM sqlite_master WHERE type='table' ORDER BY name\""

[tasks."cf:d1:tables:remote"]
description = "List tables in remote D1"
run         = "bun x wrangler d1 execute {{env.CF_D1_NAME}} --remote --command \"SELECT name FROM sqlite_master WHERE type='table' ORDER BY name\""

[tasks."cf:d1:migrations:create"]
description = "Create a new D1 migration (set NAME env var)"
run         = "bun x wrangler d1 migrations create {{env.CF_D1_NAME}} \"$NAME\""

[tasks."cf:d1:migrations:apply"]
description = "Apply D1 migrations locally (idempotent)"
run         = "bun x wrangler d1 migrations apply {{env.CF_D1_NAME}} --local"

[tasks."cf:d1:migrations:apply:remote"]
description = "Apply D1 migrations to remote (idempotent)"
run         = "bun x wrangler d1 migrations apply {{env.CF_D1_NAME}} --remote"

# ── cf:r2: storage ───────────────────────────────────────────────────────────

[tasks."cf:r2:list"]
description = "List R2 buckets"
run         = "bun x wrangler r2 bucket list"

[tasks."cf:r2:create"]
description = "Create the project R2 bucket"
run         = "bun x wrangler r2 bucket create {{env.CF_R2_NAME}}"

[tasks."cf:r2:objects"]
description = "List objects in the R2 bucket"
run         = "bun x wrangler r2 object list {{env.CF_R2_NAME}}"
